<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Iniciar sesión</h2>

        <select id="usuarioSelect" onchange="seleccionarUsuarioLogin()">
            <option value="">Seleccionar asesora</option>
        </select>
        <input type="text" id="usuario" placeholder="Usuario manual" autocomplete="username" style="display:none;">
        <div class="password-box">

            <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">

            <span onclick="toggleLoginPassword(this)">
                👁️
            </span>

        </div>

        <button onclick="login()">Ingresar</button>
        <p id="loginMensaje" class="login-mensaje" role="status"></p>
    </div>

    <div id="loaderGlobal" class="loader-overlay" style="display:none;">
        <div class="loader">
            <div class="loader__balls">
                <div class="loader__balls__group">
                    <div class="ball item1"></div>
                    <div class="ball item2"></div>
                    <div class="ball item3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function mostrarLoader() {
            const loader = document.getElementById("loaderGlobal");

            if (loader) {
                loader.style.display = "flex";
            }
        }

        function ocultarLoader() {
            const loader = document.getElementById("loaderGlobal");

            if (loader) {
                loader.style.display = "none";
            }
        }

        function mostrarMensajeLogin(mensaje) {
            document.getElementById("loginMensaje").textContent = mensaje;
        }

        async function cargarUsuariosLogin() {
            const select = document.getElementById("usuarioSelect");
            const inputUsuario = document.getElementById("usuario");

            inputUsuario.style.display = "none";
            inputUsuario.value = "";

            try {
                const res = await fetch("/login-usuarios");
                console.log("[login-usuarios] status:", res.status);

                if (!res.ok) {
                    console.error("[login-usuarios] error HTTP:", res.status);
                    select.innerHTML = [
                        '<option value="">Seleccionar asesora</option>',
                        '<option value="__manual__">Escribir usuario manualmente</option>'
                    ].join("");
                    return;
                }

                const usuarios = await res.json();
                console.log("[login-usuarios] respuesta:", usuarios);
                console.log("[login-usuarios] cantidad:", Array.isArray(usuarios) ? usuarios.length : 0);

                select.innerHTML = '<option value="">Seleccionar asesora</option>';

                if (!Array.isArray(usuarios) || usuarios.length === 0) {
                    select.innerHTML = [
                        '<option value="">Seleccionar asesora</option>',
                        '<option value="__manual__">Escribir usuario manualmente</option>'
                    ].join("");
                    return;
                }

                usuarios.forEach(user => {
                    const option = document.createElement("option");
                    const rolVisible = user.rol === "vendedora" ? "asesora" : user.rol;
                    option.value = user.usuario;
                    option.textContent = `${user.usuario} (${rolVisible})`;
                    select.appendChild(option);
                });

                const optionManual = document.createElement("option");
                optionManual.value = "__manual__";
                optionManual.textContent = "Escribir usuario manualmente";
                select.appendChild(optionManual);
            } catch (error) {
                console.error("[login-usuarios] error fetch:", error);
                select.innerHTML = [
                    '<option value="">Seleccionar asesora</option>',
                    '<option value="__manual__">Escribir usuario manualmente</option>'
                ].join("");
            }
        }

        function seleccionarUsuarioLogin() {
            const usuarioSeleccionado = document.getElementById("usuarioSelect").value;
            const inputUsuario = document.getElementById("usuario");

            if (usuarioSeleccionado === "__manual__") {
                inputUsuario.value = "";
                inputUsuario.style.display = "block";
                inputUsuario.focus();
                return;
            }

            if (usuarioSeleccionado) {
                inputUsuario.value = usuarioSeleccionado;
                inputUsuario.style.display = "none";
                return;
            }

            inputUsuario.value = "";
            inputUsuario.style.display = "none";
        }

        async function login() {
            const usuario = document.getElementById("usuario").value.trim();
            const password = document.getElementById("password").value;

            mostrarMensajeLogin("");

            if (!usuario || !password) {
                mostrarMensajeLogin("Completá usuario y contraseña");
                return;
            }

            mostrarLoader();

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ usuario, password })
                });

                let data;
                try {
                    data = await res.json();
                } catch {
                    mostrarMensajeLogin("Error en el servidor");
                    return;
                }

                if (res.ok) {
                    localStorage.setItem("token", data.token);
                    window.location.href = "/app.html";
                } else {
                    mostrarMensajeLogin("Usuario o contraseña incorrectos");
                }
            } catch {
                mostrarMensajeLogin("No se pudo iniciar sesión");
            } finally {
                ocultarLoader();
            }
        }

        function toggleLoginPassword(el) {

            const input =
                document.getElementById("password");

            if (input.type === "password") {

                input.type = "text";
                el.textContent = "🙈";

            } else {

                input.type = "password";
                el.textContent = "👁️";
            }
        }
        
        cargarUsuariosLogin();
    </script>

</body>

</html>
