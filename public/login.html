<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Iniciar sesión</h2>

        <input type="text" id="usuario" placeholder="Usuario">
        <div class="password-box">

            <input type="password" id="password" placeholder="Contraseña">

            <span onclick="toggleLoginPassword(this)">
                👁️
            </span>

        </div>

        <button onclick="login()">Ingresar</button>
        <p id="loginMensaje" class="login-mensaje" role="status"></p>
    </div>

    <div id="loaderGlobal" class="loader-overlay" style="display:none;">
        <div class="loader">
            <div class="loader__balls">
                <div class="loader__balls__group">
                    <div class="ball item1"></div>
                    <div class="ball item2"></div>
                    <div class="ball item3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function mostrarLoader() {
            const loader = document.getElementById("loaderGlobal");

            if (loader) {
                loader.style.display = "flex";
            }
        }

        function ocultarLoader() {
            const loader = document.getElementById("loaderGlobal");

            if (loader) {
                loader.style.display = "none";
            }
        }

        function mostrarMensajeLogin(mensaje) {
            document.getElementById("loginMensaje").textContent = mensaje;
        }

        async function loginAnterior() {
            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;

            const res = await fetch("/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ usuario, password })
            });

            console.log("STATUS:", res.status);

            let data;
            try {
                data = await res.json();
            } catch {
                mostrarMensajeLogin("Error en el servidor");
                return;
            }

            console.log("RESPONSE:", data);

            if (res.ok) {
                localStorage.setItem("token", data.token);
                window.location.href = "/app.html";
            } else {
                mostrarMensajeLogin("Usuario o contraseÃ±a incorrectos");
            }
        }

        async function login() {
            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;

            mostrarMensajeLogin("");
            mostrarLoader();

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ usuario, password })
                });

                let data;
                try {
                    data = await res.json();
                } catch {
                    mostrarMensajeLogin("Error en el servidor");
                    return;
                }

                if (res.ok) {
                    localStorage.setItem("token", data.token);
                    window.location.href = "/app.html";
                } else {
                    mostrarMensajeLogin("Usuario o contraseÃ±a incorrectos");
                }
            } catch {
                mostrarMensajeLogin("No se pudo iniciar sesiÃ³n");
            } finally {
                ocultarLoader();
            }
        }

        function toggleLoginPassword(el) {

            const input =
                document.getElementById("password");

            if (input.type === "password") {

                input.type = "text";
                el.textContent = "🙈";

            } else {

                input.type = "password";
                el.textContent = "👁️";
            }
        }
    </script>

</body>

</html>
