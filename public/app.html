<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1b4f72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Cotizador Asismed</title>
    <link rel="stylesheet" href="style.css">


    <link rel="icon" type="image/png" href="img/logo-mobile.png">

    <link rel="apple-touch-icon" href="img/logo-mobile.png">

    <link rel="shortcut icon" href="img/logo-mobile.png">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <h2>Asismed</h2>

            <nav>

                <button onclick="mostrarSeccion('cotizador')">📊 Cotizador</button>
                <button onclick="mostrarSeccion('misCotizaciones')">
                    🔍 Cotizaciones
                </button>

                <button onclick="mostrarSeccion('biblioteca')">
                    📁 Biblioteca
                </button>

                <button id="btnUsuarios" onclick="mostrarSeccion('usuarios')">
                    👥 Usuarios
                </button>
                <button onclick="mostrarSeccion('perfil')">
                    🔐 Mi contraseña
                </button>
            </nav>

            <button class="logout" onclick="logout()">Cerrar sesión</button>
        </aside>
        <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

        <!-- CONTENIDO -->
        <main class="main">

            <!-- TOPBAR -->
            <div class="topbar">

                <button class="menu-btn" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <div class="topbar-logo">

                    <img src="img/logo-asismed.png" alt="Asismed">

                </div>

                <span id="usuarioLogueado"></span>

            </div>

            <!-- SECCIÓN COTIZADOR -->
            <section id="cotizador" class="seccion">

                <div class="container">
                    <h2>Buscar cliente</h2>
                    <input type="text" id="dni" placeholder="DNI">
                    <button onclick="buscar()">Buscar</button>

                    <div id="resultados"></div>
                </div>

                <div class="container">
                    <h3>Nueva cotización</h3>
                    <input type="text" id="nombre" placeholder="Nombre">
                    <input type="text" id="celular" placeholder="Celular">
                    <select id="plan">

                        <option value="">
                            Seleccionar plan
                        </option>

                        <option value="Oro">
                            Oro
                        </option>

                        <option value="Plata">
                            Plata
                        </option>

                        <option value="Bronce">
                            Bronce
                        </option>

                        <option value="Acero">
                            Acero
                        </option>

                        <option value="Cromo">
                            Cromo
                        </option>

                        <option value="Plan Plus">
                            Plus
                        </option>

                    </select>

                    <select id="tipoCobertura">
                        <option value="Individual">Cobertura Individual</option>
                        <option value="Grupo Familiar">Grupo Familiar</option>
                    </select>
                    <select id="modalidad">
                        <option value="PARTICULAR">Particular</option>
                        <option value="RD OSTV">RD OSTV</option>
                    </select>
                    <input type="text" id="valor" placeholder="Valor">
                    <label>
                        Cotización válida hasta
                    </label>

                    <input type="date" id="vigencia">
                    <div class="check-group">

                        <input type="checkbox" id="referido">

                        <label for="referido">
                            Referido
                        </label>

                    </div>
                    <label>
                        Congelamiento de cuota
                    </label>

                    <select id="congelamiento">

                        <option value="">
                            Sin congelamiento
                        </option>

                        <option value="3 meses">
                            3 meses
                        </option>

                        <option value="6 meses">
                            6 meses
                        </option>

                    </select>
                    <textarea id="comentarios" placeholder="Comentarios"></textarea>

                    <button onclick="agregar()">Guardar</button>
                </div>

            </section>

            <!-- SECCIÓN USUARIOS -->
            <section id="usuarios" class="seccion" style="display:none;">

                <div class="container">
                    <h2>Usuarios</h2>
                    <div id="listaUsuarios"></div>
                </div>

                <div class="container" id="seccionAdmin">
                    <h3>Crear usuario</h3>

                    <input type="text" id="nuevoUsuario" placeholder="Usuario">
                    <input type="text" id="nuevoPassword" placeholder="Contraseña">

                    <select id="nuevoRol">
                        <option value="vendedora">Asesora Call</option>
                        <option value="admin">Admin</option>
                    </select>

                    <button onclick="crearUsuario()">Crear</button>
                </div>

            </section>

            <!-- SECCIÓN BIBLIOTECA -->
            <section id="biblioteca" class="seccion" style="display:none;">

                <div class="container">
                    <h2>📁 Biblioteca</h2>

                    <div class="card">
                        <h3>📄 Documentos y procedimientos</h3>

                        <a href="archivos/Guia-de-procedimientos-Y-Utilidades.pdf" target="_blank">
                            <button>Abrir</button>
                        </a>
                    </div>

                </div>

            </section>
            <section id="perfil" class="seccion" style="display:none;">

                <div class="container">

                    <h2>Cambiar contraseña</h2>

                    <div class="password-box">
                        <input type="password" id="passwordActual" placeholder="Contraseña actual">

                        <span onclick="togglePassword('passwordActual', this)">
                            👁️
                        </span>
                    </div>

                    <div class="password-box">
                        <input type="password" id="passwordNueva" placeholder="Nueva contraseña">

                        <span onclick="togglePassword('passwordNueva', this)">
                            👁️
                        </span>
                    </div>

                    <button onclick="cambiarPassword()">
                        Guardar contraseña
                    </button>

                </div>

            </section>

            <section id="misCotizaciones" class="seccion" style="display:none;">

                <div class="container">

                    <h2 id="tituloCotizaciones">
                        Mis cotizaciones
                    </h2>

                    <div id="misResultados"></div>

                </div>

            </section>

        </main>

    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- MODAL COMENTARIO -->
    <div id="modal" class="modal">

        <div class="modal-content">
            <h3>Editar comentario</h3>

            <textarea id="modalComentario" rows="5"></textarea>

            <button onclick="guardarComentario()">
                Guardar
            </button>

            <button class="secondary-btn" onclick="cerrarModalComentario()">
                Cancelar
            </button>
        </div>

    </div>
    <!-- MODAL EDITAR USUARIO -->
    <div id="modalEditar" class="modal">

        <div class="modal-content">
            <h3>Editar usuario</h3>

            <input type="password" id="editPassword" placeholder="Nueva contraseña">

            <select id="editRol">
                <option value="vendedora">Asesora Call</option>
                <option value="admin">Admin</option>
            </select>

            <button onclick="guardarEdicion()">
                Guardar cambios
            </button>

            <button class="secondary-btn" onclick="cerrarModalEditar()">
                Cancelar
            </button>
        </div>

    </div>


    <div id="loaderGlobal" class="loader-overlay" style="display:none;">

        <div class="loader">

            <svg class="svg-wrap" viewBox="0 0 120 30">

                <circle class="circle circle-one" cx="15" cy="15" r="5"></circle>

                <circle class="circle circle-two" cx="60" cy="15" r="5"></circle>

                <circle class="circle circle-three" cx="105" cy="15" r="5"></circle>

                <path class="svg-stroke" d="M15 15 H105" stroke-width="5" stroke-linecap="round"></path>

            </svg>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
