<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cotizador Asismed</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>Asismed</h2>

            <nav>
                <button onclick="mostrarSeccion('cotizador')">📊 Cotizador</button>
                <button onclick="mostrarSeccion('usuarios')">👥 Usuarios</button>
            </nav>

            <button class="logout" onclick="logout()">Cerrar sesión</button>
        </aside>

        <!-- CONTENIDO -->
        <main class="main">

            <!-- TOPBAR -->
            <div class="topbar">
                <span id="usuarioLogueado"></span>
            </div>

            <!-- SECCIÓN COTIZADOR -->
            <section id="cotizador" class="seccion">

                <div class="container">
                    <h2>Buscar cliente</h2>
                    <input type="text" id="dni" placeholder="DNI">
                    <button onclick="buscar()">Buscar</button>

                    <div id="resultados"></div>
                </div>

                <div class="container">
                    <h3>Nueva cotización</h3>
                    <input type="text" id="nombre" placeholder="Nombre">
                    <input type="text" id="celular" placeholder="Celular">
                    <input type="text" id="plan" placeholder="Plan">
                    <input type="text" id="valor" placeholder="Valor">
                    <textarea id="comentarios" placeholder="Comentarios"></textarea>

                    <button onclick="agregar()">Guardar</button>
                </div>

            </section>

            <!-- SECCIÓN USUARIOS -->
            <section id="usuarios" class="seccion" style="display:none;">

                <div class="container">
                    <h2>Usuarios</h2>
                    <div id="listaUsuarios"></div>
                </div>

                <div class="container" id="seccionAdmin">
                    <h3>Crear usuario</h3>

                    <input type="text" id="nuevoUsuario" placeholder="Usuario">
                    <input type="text" id="nuevoPassword" placeholder="Contraseña">

                    <select id="nuevoRol">
                        <option value="vendedora">Asesora Call</option>
                        <option value="admin">Admin</option>
                    </select>

                    <button onclick="crearUsuario()">Crear</button>
                </div>

            </section>

        </main>

    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>

</body>

</html>
